<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Party - Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="player.css">
</head>
<body>
  <div class="topbar">
    <h1>Prompt Party</h1>
  </div>

  <div class="main">
    <div class="card" role="main">
      <div class="card-header">
        <h2>Ready to Play?</h2>
      </div>
      <div class="card-body">
        <p class="muted" style="margin-bottom:14px">Enter the chaos below.</p>
        <label for="joinCode">Room Code</label>
        <input id="joinCode" type="text" maxlength="10" inputmode="text" autocomplete="off" placeholder="ABCD" />
        <label for="name">Player Name</label>
        <input id="name" type="text" maxlength="20" autocomplete="name" placeholder="Your name" />
        <div class="muted">Enter the room code shown on the host's screen.</div>
        <button id="joinBtn" class="btn btn-primary">JOIN GAME</button>
        <div id="message"></div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="join.js"></script>
</body>
</html>
