<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Party - Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Space Grotesk',sans-serif}
    body{
      display:flex;flex-direction:column;align-items:center;
      background-color:#f6f6f6;
      background-image:radial-gradient(#e5e5e5 1px,transparent 1px);
      background-size:20px 20px;
      padding:0;
    }

    /* Top bar */
    .topbar{
      width:100%;background:#fff;border-bottom:3px solid #000;
      padding:12px 20px;text-align:center;flex-shrink:0;
    }
    .topbar h1{
      font-weight:900;font-style:italic;text-transform:uppercase;
      letter-spacing:-0.05em;color:#ff66b2;font-size:22px;margin:0;
    }

    /* Main content area */
    .main{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:20px;width:100%;overflow-y:auto;
    }

    /* Sticker card */
    .card{
      background:#fff;border:3px solid #000;
      box-shadow:8px 8px 0 0 rgba(0,0,0,1);
      width:100%;max-width:420px;padding:0;
      position:relative;
    }
    .card-header{
      background:#fbfb62;border-bottom:3px solid #000;
      padding:14px 20px;
    }
    .card-header h2{
      font-weight:900;font-style:italic;text-transform:uppercase;
      font-size:20px;letter-spacing:-0.03em;
    }
    .card-body{padding:20px}

    /* Labels */
    label{
      display:block;font-weight:900;text-transform:uppercase;
      font-size:11px;letter-spacing:0.05em;margin-bottom:4px;color:#000;
    }

    /* Inputs - stark, bold */
    input[type=text]{
      width:100%;background:#fff;border:3px solid #000;
      padding:12px;font-family:'Space Grotesk',sans-serif;
      font-weight:700;font-size:16px;margin-bottom:14px;
      outline:none;
    }
    input[type=text]:focus{
      box-shadow:0 0 0 4px rgba(94,248,248,0.3);
    }
    input[type=text]::placeholder{color:#aaa}

    /* Muted helper text */
    .muted{font-size:12px;color:#666;font-weight:700;margin-top:4px;margin-bottom:8px}

    /* Primary button - tactile press-down */
    .btn{
      display:block;width:100%;padding:14px;
      border:3px solid #000;font-family:'Space Grotesk',sans-serif;
      font-weight:900;text-transform:uppercase;letter-spacing:-0.03em;
      font-size:18px;cursor:pointer;position:relative;
      transition:all 75ms ease;
    }
    .btn-primary{
      background:#fbfb62;color:#000;
      box-shadow:4px 4px 0 0 rgba(0,0,0,1);
    }
    .btn-primary:hover{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 0 rgba(0,0,0,1);
    }
    .btn-primary:active,.btn-primary:disabled{
      transform:translate(0,0);box-shadow:none;
    }
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}

    .btn-pink{
      background:#ff66b2;color:#000;
      box-shadow:4px 4px 0 0 rgba(0,0,0,1);
    }
    .btn-pink:hover{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 0 rgba(0,0,0,1);
    }
    .btn-pink:active{transform:translate(0,0);box-shadow:none}

    .btn-green{
      background:#16a34a;color:#fff;
      box-shadow:4px 4px 0 0 rgba(0,0,0,1);
    }
    .btn-green:hover{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 0 rgba(0,0,0,1);
    }
    .btn-green:active{transform:translate(0,0);box-shadow:none}

    /* Messages */
    .error{
      background:#fff0f2;border:3px solid #000;color:#b00020;
      padding:10px 14px;font-weight:700;font-size:14px;margin-top:12px;
    }
    .success{
      background:#5ef8f8;border:3px solid #000;color:#000;
      padding:10px 14px;font-weight:700;font-size:14px;margin-top:12px;
    }

    /* Player list */
    ul{list-style:none;padding:0;margin:10px 0}
    li{
      padding:10px 14px;background:#fff;border:3px solid #000;
      margin-bottom:6px;display:flex;align-items:center;
      font-weight:700;font-size:14px;text-transform:uppercase;
      box-shadow:3px 3px 0 0 rgba(0,0,0,1);
    }
    .dot{width:10px;height:10px;border-radius:50%;margin-right:10px;border:2px solid #000}
    .dot.online{background:#16a34a}
    .dot.offline{background:#9ca3af}
    .small{font-size:13px;color:#000}
    .center{text-align:center}

    /* Badge / tag */
    .badge{
      display:inline-block;border:3px solid #000;padding:4px 12px;
      font-weight:900;text-transform:uppercase;font-size:11px;
      letter-spacing:0.03em;
    }
    .badge-teal{background:#5ef8f8}
    .badge-pink{background:#ff66b2}
    .badge-yellow{background:#fbfb62}

    /* Topic display */
    .topic-text{
      font-weight:900;font-style:italic;text-transform:uppercase;
      letter-spacing:-0.05em;font-size:22px;color:#000;
      line-height:1.2;margin:12px 0;
    }

    /* Timer */
    .timer-box{
      display:inline-block;background:#5ef8f8;border:3px solid #000;
      padding:8px 20px;box-shadow:4px 4px 0 0 rgba(0,0,0,1);
      margin:10px 0;
    }
    .timer-box.urgent{background:#ff66b2;animation:pulse 1.5s ease-in-out infinite}
    .timer-text{
      font-weight:900;font-style:italic;font-size:32px;color:#000;
    }

    /* Actor banner */
    .actor-banner{
      background:#fbfb62;border:3px solid #000;padding:14px;
      font-weight:900;text-transform:uppercase;font-size:16px;
      text-align:center;margin:12px 0;
      box-shadow:4px 4px 0 0 rgba(0,0,0,1);
    }

    /* Prompt input area */
    .prompt-area textarea{
      width:100%;background:#fff;border:3px solid #000;
      padding:14px;font-family:'Space Grotesk',sans-serif;
      font-weight:700;font-size:16px;min-height:80px;resize:vertical;
      outline:none;
    }
    .prompt-area textarea:focus{
      box-shadow:0 0 0 4px rgba(94,248,248,0.3);
    }
    .prompt-area textarea::placeholder{color:#aaa}

    /* Voting prompt cards */
    .vote-card{
      background:#fff;border:3px solid #000;padding:16px;
      margin-bottom:10px;cursor:pointer;
      box-shadow:4px 4px 0 0 rgba(0,0,0,1);
      transition:all 75ms ease;
    }
    .vote-card:hover{
      transform:translate(-2px,-2px);
      box-shadow:6px 6px 0 0 rgba(0,0,0,1);
    }
    .vote-card:active{
      transform:translate(0,0);box-shadow:none;
    }
    .vote-card.selected{
      background:#5ef8f8;border-color:#000;
    }
    .vote-card.disabled{
      opacity:0.4;cursor:not-allowed;
    }
    .vote-card.disabled:hover{
      transform:none;box-shadow:4px 4px 0 0 rgba(0,0,0,1);
    }
    .vote-card-text{font-weight:700;font-size:16px;margin-bottom:6px}
    .vote-card-author{font-weight:700;font-size:12px;color:#666;text-transform:uppercase}

    /* Voting timer */
    .voting-timer{
      text-align:center;font-weight:900;font-style:italic;
      font-size:36px;color:#000;margin-bottom:16px;
    }

    /* Selected prompt / results */
    .result-sticker{
      background:#fff;border:3px solid #000;
      box-shadow:8px 8px 0 0 rgba(0,0,0,1);
      padding:20px;text-align:center;
    }
    .result-prompt{
      font-weight:900;font-style:italic;font-size:20px;
      padding:16px;background:#fbfb62;border:3px solid #000;
      margin:14px 0;
    }
    .result-author{font-weight:700;font-size:15px;color:#333;margin-bottom:8px}
    .result-actor{
      font-weight:900;text-transform:uppercase;font-size:13px;
      color:#ff66b2;
    }
    .result-winner{
      display:inline-block;background:#16a34a;color:#fff;
      border:3px solid #000;padding:6px 16px;
      font-weight:900;text-transform:uppercase;font-size:14px;
      margin-top:10px;box-shadow:3px 3px 0 0 rgba(0,0,0,1);
    }

    /* Splash screen */
    .splash-screen{
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:#fbfb62;border:none;
      display:flex;align-items:center;justify-content:center;
      z-index:1000;animation:splashFadeIn 0.4s ease-out;
    }
    @keyframes splashFadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    .splash-content{text-align:center;padding:40px}
    .splash-title{
      font-weight:900;font-style:italic;text-transform:uppercase;
      font-size:42px;letter-spacing:-0.05em;color:#000;
      margin-bottom:16px;animation:pulse 2s ease-in-out infinite;
    }
    .splash-subtitle{
      font-weight:900;font-size:22px;text-transform:uppercase;color:#ff66b2;
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

    /* Decorative shapes */
    .deco{position:absolute;z-index:-1}
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <h1>Prompt Party</h1>
  </div>

  <div class="main">
    <div class="card" role="main">
      <!-- JOIN FORM -->
      <div id="formArea">
        <div class="card-header">
          <h2>Ready to Play?</h2>
        </div>
        <div class="card-body">
          <p class="muted" style="margin-bottom:14px">Enter the chaos below.</p>
          <label for="joinCode">Room Code</label>
          <input id="joinCode" type="text" maxlength="10" inputmode="text" autocomplete="off" placeholder="ABCD" />
          <label for="name">Player Name</label>
          <input id="name" type="text" maxlength="20" autocomplete="name" placeholder="Your name" />
          <div class="muted">Enter the room code shown on the host's screen.</div>
          <button id="joinBtn" class="btn btn-primary">JOIN GAME</button>
          <div id="message"></div>
        </div>
      </div>

      <!-- LOBBY -->
      <div id="lobbyArea" style="display:none">
        <div class="card-header" style="background:#5ef8f8">
          <h2>YOU'RE IN!</h2>
        </div>
        <div class="card-body">
          <div class="center">
            <span class="badge badge-yellow" id="roomCodeText" style="font-size:16px;padding:6px 16px"></span>
          </div>
          <div style="margin-top:14px">
            <div style="font-weight:900;text-transform:uppercase;font-size:12px;margin-bottom:8px">Party Goers</div>
            <ul id="playersList"></ul>
          </div>
          <div id="lobbyMessage" class="muted" style="text-align:center;margin-top:10px"></div>
        </div>
      </div>

      <!-- ROUND AREA -->
      <div id="roundArea" style="display:none">
        <div class="card-header">
          <h2>Round Topic</h2>
        </div>
        <div class="card-body">
          <div class="center">
            <div id="topicDisplay" class="topic-text"></div>
            <div class="timer-box" id="timerBox">
              <div class="timer-text" id="timerDisplay">1:30</div>
            </div>
            <div id="actorBanner" class="actor-banner" style="display:none">
              You are the actor!
            </div>
          </div>

          <!-- Prompt submission -->
          <div id="promptForm" class="prompt-area" style="margin-top:16px">
            <label for="promptInput">Type Your Weirdest Answer...</label>
            <input id="promptInput" type="text" maxlength="100" placeholder="TYPE YOUR WEIRDEST ANSWER..." />
            <button id="submitPromptBtn" class="btn btn-pink" style="margin-top:10px">SEND IT!</button>
          </div>
          <div id="promptMessage"></div>

          <!-- Voting -->
          <div id="votingArea" style="display:none;margin-top:16px">
            <div style="text-align:center;margin-bottom:12px">
              <span class="badge badge-teal" style="font-size:14px;padding:6px 16px">VOTE NOW</span>
            </div>
            <div class="voting-timer" id="votingTimer">1:00</div>
            <div id="promptsList"></div>
            <div id="votingMessage"></div>
          </div>

          <!-- Results -->
          <div id="selectedPromptArea" style="display:none;margin-top:16px">
            <div class="result-sticker">
              <span class="badge badge-teal" style="margin-bottom:12px;display:inline-block">WINNING PROMPT</span>
              <div id="resultsTopic" class="muted" style="margin-top:10px"></div>
              <div id="selectedPromptText" class="result-prompt"></div>
              <div id="selectedPromptAuthor" class="result-author"></div>
              <div id="resultsActor" class="result-actor"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const joinCodeInput = document.getElementById('joinCode');
      const nameInput = document.getElementById('name');
      const joinBtn = document.getElementById('joinBtn');
      const messageDiv = document.getElementById('message');
      const formArea = document.getElementById('formArea');
      const lobbyArea = document.getElementById('lobbyArea');
      const roundArea = document.getElementById('roundArea');
      const roomCodeText = document.getElementById('roomCodeText');
      const playersList = document.getElementById('playersList');
      const lobbyMessage = document.getElementById('lobbyMessage');
      const topicDisplay = document.getElementById('topicDisplay');
      const timerDisplay = document.getElementById('timerDisplay');
      const timerBox = document.getElementById('timerBox');
      const actorBanner = document.getElementById('actorBanner');
      const promptForm = document.getElementById('promptForm');
      const promptInput = document.getElementById('promptInput');
      const submitPromptBtn = document.getElementById('submitPromptBtn');
      const promptMessage = document.getElementById('promptMessage');
      const votingArea = document.getElementById('votingArea');
      const votingTimer = document.getElementById('votingTimer');
      const promptsList = document.getElementById('promptsList');
      const votingMessage = document.getElementById('votingMessage');
      const selectedPromptArea = document.getElementById('selectedPromptArea');
      const selectedPromptText = document.getElementById('selectedPromptText');
      const selectedPromptAuthor = document.getElementById('selectedPromptAuthor');
      const resultsTopic = document.getElementById('resultsTopic');
      const resultsActor = document.getElementById('resultsActor');

      let token = null;
      let playerId = null;
      let ws = null;
      let currentRound = null;
      let timerInterval = null;
      let votingTimerInterval = null;
      let hasVoted = false;
      let votingEndTime = null;

      function checkAutoJoin(){
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const name = params.get('name');
        const autoJoin = params.get('autoJoin');
        if(code && name && autoJoin === 'true'){
          joinCodeInput.value = code.toUpperCase();
          nameInput.value = name;
          setTimeout(()=>{ joinRoom(); }, 500);
        }
      }

      function setMessage(text, type){
        messageDiv.innerHTML = '';
        if(!text) return;
        const div = document.createElement('div');
        div.className = type === 'error' ? 'error' : 'success';
        div.textContent = text;
        messageDiv.appendChild(div);
      }

      function normalizeCode(code){
        return (code||'').trim().toUpperCase();
      }

      joinCodeInput.addEventListener('input', (e)=>{
        joinCodeInput.value = normalizeCode(joinCodeInput.value).slice(0,10);
      });

      async function joinRoom(){
        setMessage('');
        const joinCode = normalizeCode(joinCodeInput.value);
        const name = (nameInput.value||'').trim().slice(0,20);
        if(!joinCode){ setMessage('Please enter a room code', 'error'); return; }
        if(!name){ setMessage('Please enter your name', 'error'); return; }

        joinBtn.disabled = true;
        joinBtn.textContent = 'JOINING...';

        try{
          const res = await fetch('/join', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ joinCode, name }) });
          if(res.status === 404){ setMessage('Room not found', 'error'); joinBtn.disabled = false; joinBtn.textContent = 'JOIN GAME'; return; }
          if(res.status === 400){ const body = await res.json(); setMessage(body.error || 'Bad request', 'error'); joinBtn.disabled = false; joinBtn.textContent = 'JOIN GAME'; return; }
          if(!res.ok){ setMessage('Network error', 'error'); joinBtn.disabled = false; joinBtn.textContent = 'JOIN GAME'; return; }
          const data = await res.json();
          token = data.token;
          playerId = data.playerId;
          setMessage('Joined room, connecting...', 'success');
          openWebSocket();
          roomCodeText.textContent = data.joinCode || data.roomId;
          formArea.style.display = 'none';
          lobbyArea.style.display = '';
        }catch(err){
          setMessage('Network error while joining', 'error');
        }finally{
          joinBtn.disabled = false;
          joinBtn.textContent = 'JOIN GAME';
        }
      }

      joinBtn.addEventListener('click', joinRoom);

      function openWebSocket(){
        const host = window.location.origin.replace(/^http/, 'ws');
        ws = new WebSocket(host.replace(/^http/, 'ws') + '/ws');

        ws.onopen = () => {
          setMessage('Connected, authenticating...', 'success');
          ws.send(JSON.stringify({ type: 'auth', payload: { token } }));
        };

        ws.onmessage = (ev) => {
          try{
            const msg = JSON.parse(ev.data);
            if(msg.type === 'auth_ok'){
              setMessage('');
              const roomState = msg.payload.roomState;
              updatePlayers(roomState);
              lobbyMessage.textContent = 'Waiting for the host to start the chaos...';
            } else if(msg.type === 'room_state'){
              updatePlayers(msg.payload);
            } else if(msg.type === 'auth_error'){
              setMessage('Auth error: ' + (msg.payload?.error || ''), 'error');
            } else if(msg.type === 'round_started'){
              handleRoundStarted(msg.payload);
            } else if(msg.type === 'prompt_accepted'){
              submitPromptBtn.disabled = true;
              submitPromptBtn.textContent = 'SUBMITTED!';
              promptInput.disabled = true;
              setPromptMessage('Prompt submitted! Waiting for others...', 'success');
            } else if(msg.type === 'prompts_update'){
              // Could show prompt count here
            } else if(msg.type === 'voting_started'){
              showSplashScreen(msg.payload);
            } else if(msg.type === 'vote_accepted'){
              hasVoted = true;
              setVotingMessage('Vote locked in! Waiting for others...', 'success');
            } else if(msg.type === 'vote_update'){
              // Could update vote counts in real-time
            } else if(msg.type === 'prompt_selected'){
              handlePromptSelected(msg.payload);
            } else if(msg.type === 'error'){
              setPromptMessage(msg.payload?.error || 'Server error', 'error');
              submitPromptBtn.disabled = false;
              submitPromptBtn.textContent = 'SEND IT!';
            }
          }catch(e){}
        };

        ws.onclose = () => {
          lobbyMessage.textContent = 'Disconnected from server';
          Array.from(playersList.children).forEach(li=>{ const dot = li.querySelector('.dot'); if(dot){dot.classList.remove('online'); dot.classList.add('offline');} });
        };

        ws.onerror = (e) => {
          setMessage('WebSocket error', 'error');
        };
      }

      function updatePlayers(roomState){
        if(!roomState) return;
        playersList.innerHTML = '';
        const players = roomState.players || [];
        players.forEach(p=>{
          const li = document.createElement('li');
          const dot = document.createElement('div');
          dot.className = 'dot online';
          li.appendChild(dot);
          const span = document.createElement('div');
          span.className = 'small';
          span.textContent = p.name || p.id;
          li.appendChild(span);
          playersList.appendChild(li);
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (c)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[c])); }

      function handleRoundStarted(roundData){
        currentRound = roundData;
        hasVoted = false;
        lobbyArea.style.display = 'none';
        roundArea.style.display = '';
        selectedPromptArea.style.display = 'none';
        votingArea.style.display = 'none';
        topicDisplay.textContent = roundData.topic || 'Unknown topic';
        if(roundData.actorId === playerId){
          actorBanner.style.display = '';
          promptForm.style.display = 'none';
        } else {
          actorBanner.style.display = 'none';
          promptForm.style.display = '';
          submitPromptBtn.disabled = false;
          submitPromptBtn.textContent = 'SEND IT!';
          promptInput.disabled = false;
          promptInput.value = '';
        }
        setPromptMessage('');
        startTimer(roundData.maxEndAt);
      }

      function showSplashScreen(roundData){
        currentRound = roundData;
        const splash = document.createElement('div');
        splash.className = 'splash-screen';
        splash.innerHTML = '<div class="splash-content"><div class="splash-title">ALL PROMPTS IN!</div><div class="splash-subtitle">Get ready to vote...</div></div>';
        document.body.appendChild(splash);
        setTimeout(() => {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => {
            document.body.removeChild(splash);
            handleVotingStarted(roundData);
          }, 500);
        }, 5000);
      }

      function handleVotingStarted(roundData){
        promptForm.style.display = 'none';
        if(roundData.actorId === playerId){
          actorBanner.style.display = '';
          actorBanner.textContent = 'YOU ARE THE ACTOR! PLAYERS ARE VOTING...';
          votingArea.style.display = 'none';
          return;
        }
        votingArea.style.display = '';
        votingEndTime = Date.now() + 60000;
        startVotingTimer();
        promptsList.innerHTML = '';
        const prompts = roundData.prompts || [];
        prompts.forEach(prompt => {
          const promptCard = document.createElement('div');
          promptCard.className = 'vote-card';

          const promptText = document.createElement('div');
          promptText.className = 'vote-card-text';
          promptText.textContent = '"' + prompt.text + '"';

          const authorText = document.createElement('div');
          authorText.className = 'vote-card-author';
          authorText.textContent = 'by ' + escapeHtml(prompt.playerName);

          promptCard.appendChild(promptText);
          promptCard.appendChild(authorText);

          if(prompt.playerId === playerId){
            promptCard.classList.add('disabled');
            authorText.textContent = 'BY YOU (CANNOT VOTE FOR OWN)';
          } else {
            promptCard.addEventListener('click', ()=>{
              if(hasVoted) return;
              voteForPrompt(prompt.playerId, promptCard);
            });
          }
          promptsList.appendChild(promptCard);
        });
      }

      function startVotingTimer(){
        if(votingTimerInterval) clearInterval(votingTimerInterval);
        votingTimerInterval = setInterval(()=>{
          const now = Date.now();
          const timeRemaining = votingEndTime - now;
          if(timeRemaining <= 0){
            votingTimer.textContent = '0:00';
            votingTimer.style.color = '#ff66b2';
            clearInterval(votingTimerInterval);
            return;
          }
          const seconds = Math.floor(timeRemaining / 1000);
          const minutes = Math.floor(seconds / 60);
          const secs = seconds % 60;
          votingTimer.textContent = minutes+':'+secs.toString().padStart(2, '0');
          if(timeRemaining <= 10000) votingTimer.style.color = '#ff66b2';
          else votingTimer.style.color = '#000';
        }, 100);
      }

      function voteForPrompt(promptPlayerId, cardElement){
        if(hasVoted) return;
        if(ws && ws.readyState === WebSocket.OPEN){
          ws.send(JSON.stringify({ type: 'submit_vote', payload: { promptPlayerId } }));
          cardElement.classList.add('selected');
          // Disable all other cards
          document.querySelectorAll('.vote-card').forEach(c => {
            if(c !== cardElement) { c.classList.add('disabled'); }
          });
          setVotingMessage('Vote locked in!', 'success');
        }
      }

      function setVotingMessage(text, type){
        votingMessage.innerHTML = '';
        if(!text) return;
        const div = document.createElement('div');
        div.className = type === 'error' ? 'error' : 'success';
        div.textContent = text;
        votingMessage.appendChild(div);
      }

      function handlePromptSelected(data){
        if(votingTimerInterval) clearInterval(votingTimerInterval);
        votingArea.style.display = 'none';
        actorBanner.style.display = 'none';
        selectedPromptArea.style.display = '';
        const actorName = data.actorName || 'Unknown Actor';
        const topic = data.topic || currentRound?.topic || 'Unknown Topic';
        resultsTopic.textContent = 'Topic: "' + topic + '"';
        selectedPromptText.textContent = '"' + data.promptText + '"';
        selectedPromptAuthor.textContent = 'by ' + data.playerName + ' \u2022 ' + data.votes + ' vote' + (data.votes !== 1 ? 's' : '');
        resultsActor.textContent = 'ACTOR: ' + actorName;
        if(data.promptPlayerId === playerId){
          const winBadge = document.createElement('div');
          winBadge.className = 'result-winner';
          winBadge.textContent = 'YOUR PROMPT WON!';
          selectedPromptAuthor.after(winBadge);
        }
      }

      function setPromptMessage(text, type){
        promptMessage.innerHTML = '';
        if(!text) return;
        const div = document.createElement('div');
        div.className = type === 'error' ? 'error' : 'success';
        div.textContent = text;
        promptMessage.appendChild(div);
      }

      function startTimer(maxEndAt){
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(()=>{
          const now = Date.now();
          const timeRemaining = maxEndAt - now;
          if(timeRemaining <= 0){
            timerDisplay.textContent = '0:00';
            timerBox.classList.add('urgent');
            clearInterval(timerInterval);
            return;
          }
          const seconds = Math.floor(timeRemaining / 1000);
          const minutes = Math.floor(seconds / 60);
          const secs = seconds % 60;
          timerDisplay.textContent = minutes+':'+secs.toString().padStart(2, '0');
          if(timeRemaining <= 10000) timerBox.classList.add('urgent');
          else timerBox.classList.remove('urgent');
        }, 100);
      }

      submitPromptBtn.addEventListener('click', ()=>{
        const prompt = promptInput.value.trim();
        if(!prompt){ setPromptMessage('Please enter a prompt', 'error'); return; }
        if(ws && ws.readyState === WebSocket.OPEN){
          ws.send(JSON.stringify({ type: 'submit_prompt', payload: { prompt } }));
          submitPromptBtn.disabled = true;
          submitPromptBtn.textContent = 'SENDING...';
        } else {
          setPromptMessage('Not connected to server', 'error');
        }
      });

      checkAutoJoin();
    })();
  </script>
</body>
</html>
